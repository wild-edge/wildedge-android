name: CI

on:
  push:
    branches: [ main, devel, 'release/**' ]
    paths:
      - 'wildedge/**'
      - 'gradle/**'
      - 'gradle.properties'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, devel ]
    paths:
      - 'wildedge/**'
      - 'gradle/**'
      - 'gradle.properties'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run tests
        run: ./gradlew :wildedge:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: wildedge/build/reports/tests/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run lint
        run: ./gradlew :wildedge:lint --no-daemon

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: wildedge/build/reports/lint-results*.html
