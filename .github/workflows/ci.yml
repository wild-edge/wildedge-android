name: CI

on:
  push:
    branches: [ main, devel, 'release/**' ]
    paths:
      - 'wildedge/**'
      - 'samples/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'detekt.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, devel ]
    paths:
      - 'wildedge/**'
      - 'samples/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'detekt.yml'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run tests
        run: ./gradlew :wildedge:testDebugUnitTest --no-daemon

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run lint
        run: ./gradlew :wildedge:lint --no-daemon

  detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run detekt
        run: ./gradlew detekt --no-daemon

  proguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Build release APKs
        run: ./gradlew :samples:image-classification:assembleRelease :samples:local-llm:assembleRelease :samples:local-llm-agent:assembleRelease :samples:cloud-llm:assembleRelease --no-daemon
