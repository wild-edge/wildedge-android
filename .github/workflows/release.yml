name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify tag matches VERSION_NAME
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION_NAME=$VERSION"
            exit 1
          fi

      - name: Build and publish to Maven Central
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: ./gradlew :wildedge:publishReleasePublicationToSonatypeRepository --no-daemon

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: wildedge/build/outputs/aar/wildedge-release.aar
